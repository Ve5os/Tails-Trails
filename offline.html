<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет соединения</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px;
        }
        p {
            color: #666;
            margin: 0 0 30px;
        }
        .btn-retry {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-retry:hover {
            background: #388E3C;
        }
    </style>
</head>
<body>
    <div class="offline-icon">📡</div>
    <h1>Нет интернета</h1>
    <p>Некоторые функции могут быть недоступны</p>
    <button class="btn-retry" onclick="location.reload()">Попробовать снова</button>
</body>
</html>
