<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tails & Trails">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4CAF50">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="css/styles.css">
    <title>Tails & Trails</title>
</head>
<body>

    <div class="app-container" id="appContainer">
        <!-- header iOS 26 -->
        <header class="ios-header">
            <div class="logo">
                <i class="fas fa-paw"></i>
                <span>Tails & Trails</span>
            </div>
            <span class="header-badge"><i class="fas fa-users"></i> 24 онлайн</span>
        </header>

        <div class="section-header">
            <h2 class="section-title">
                <i class="fas fa-star icon-accent"></i>
                Избранные прогулки
            </h2>
        </div>

        <!-- список -->
        <div id="favorites-list" class="favorites-list"></div>

        <!-- empty state (показывается если нет избранных) -->
        <div id="fav-empty" class="empty-state">
            <i class="fas fa-heart empty-icon"></i>
            <p>Нет избранных маршрутов :(</p>
            <p style="font-size: 14px; color: #a0a0a5;">Добавьте прогулки из раздела «Маршруты»</p>
        </div>
    </div>

    <!-- POPUP -->
    <div class="popup-overlay" id="routePopup">
        <div class="popup-content">
            <div class="popup-header">
                <div>
                    <h3 class="popup-title" id="popup-title">Название маршрута</h3>
                    <p class="popup-subtitle" id="popup-subtitle">📍 0.0 км · Активен</p>
                </div>
                <button class="popup-close" id="popupClose" aria-label="Закрыть">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="popup-details">
                <span><i class="fas fa-route"></i> <span id="popup-distance">0.0</span> км</span>
                <span><i class="fas fa-users"></i> <span id="popup-walkers">0</span> человек гуляют</span>
            </div>
            <div class="popup-walkers-section">
                <div class="popup-walkers-header">
                    <span><i class="fas fa-users"></i> Кто гуляет сейчас:</span>
                    <button class="btn--success" id="popup-toggle-fav">
                        <i class="fas fa-star"></i> В избранное
                    </button>
                </div>
                <div id="popup-walkers-list"></div>
                <div id="popup-no-walkers" class="empty-state empty-state--small">
                    <i class="fas fa-dog empty-icon empty-icon--small"></i>
                    <p>Пока никто не гуляет. Будь первым!</p>
                </div>
            </div>
            <button class="btn--primary" id="popup-join-btn">
                <i class="fas fa-walking"></i> Присоединиться к прогулке
            </button>
        </div>
    </div>

    <!-- BOTTOM NAV (iOS стиль) -->
    <div class="bottom-nav-wrapper">
        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-page="favorites">
                <i class="fas fa-star"></i>
                <span>Избранное</span>
            </a>
            <a href="#" class="nav-item" data-page="map">
                <i class="fas fa-map"></i>
                <span>Карта</span>
            </a>
            <a href="#" class="nav-item" data-page="routes">
                <i class="fas fa-list-ul"></i>
                <span>Маршруты</span>
            </a>
            <a href="#" class="nav-item" data-page="profile">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </a>
        </nav>
    </div>

    <script>
        (function() {
            // Мок-данные
            const routes = [{
                id: 1,
                name: 'Центральный парк',
                distance: 3.4,
                walkers: 8,
                favorite: true,
                subtitle: '📍 3.4 км · Активен'
            }, {
                id: 2,
                name: 'Набережная реки',
                distance: 5.1,
                walkers: 12,
                favorite: true,
                subtitle: '📍 5.1 км · Активен'
            }, {
                id: 3,
                name: 'Ботанический сад',
                distance: 2.2,
                walkers: 3,
                favorite: true,
                subtitle: '📍 2.2 км · Активен'
            }, {
                id: 4,
                name: 'Холм Света',
                distance: 6.7,
                walkers: 0,
                favorite: false,
                subtitle: '📍 6.7 км · Активен'
            }];

            let currentFavorites = routes.filter(r => r.favorite);
            let currentPopupId = null;

            const favListEl = document.getElementById('favorites-list');
            const emptyEl = document.getElementById('fav-empty');
            const popupOverlay = document.getElementById('routePopup');
            const popupClose = document.getElementById('popupClose');
            const popupTitle = document.getElementById('popup-title');
            const popupSubtitle = document.getElementById('popup-subtitle');
            const popupDistance = document.getElementById('popup-distance');
            const popupWalkers = document.getElementById('popup-walkers');
            const popupWalkersList = document.getElementById('popup-walkers-list');
            const popupNoWalkers = document.getElementById('popup-no-walkers');
            const popupToggleFav = document.getElementById('popup-toggle-fav');
            const popupJoinBtn = document.getElementById('popup-join-btn');

            function renderFavorites() {
                const favs = routes.filter(r => r.favorite);
                currentFavorites = favs;
                if (favs.length === 0) {
                    favListEl.innerHTML = '';
                    emptyEl.classList.remove('hidden');
                    return;
                }
                emptyEl.classList.add('hidden');
                favListEl.innerHTML = favs.map(route => `
                    <div class="fav-card" data-id="${route.id}">
                        <div class="fav-info">
                            <div class="fav-name">${route.name}</div>
                            <div class="fav-meta">
                                <span><i class="fas fa-route"></i> ${route.distance} км</span>
                                <span><i class="fas fa-users"></i> ${route.walkers} чел.</span>
                            </div>
                        </div>
                        <div class="fav-actions">
                            <span class="badge-walkers"><i class="fas fa-paw"></i> ${route.walkers}</span>
                            <span class="fav-star"><i class="fas fa-star" style="color: #ffb340;"></i></span>
                        </div>
                    </div>
                `).join('');

                // Клик по карточке — открыть попап
                document.querySelectorAll('.fav-card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        const id = parseInt(this.dataset.id);
                        openPopup(id);
                    });
                });
            }

            function openPopup(id) {
                const route = routes.find(r => r.id === id);
                if (!route) return;
                currentPopupId = id;
                popupTitle.textContent = route.name;
                popupSubtitle.textContent = `📍 ${route.distance} км · Активен`;
                popupDistance.textContent = route.distance;
                popupWalkers.textContent = route.walkers;

                // Список гуляющих (мок)
                const walkers = [];
                if (route.walkers > 0) {
                    for (let i = 0; i < Math.min(route.walkers, 5); i++) {
                        walkers.push(`Гуляка ${i+1}`);
                    }
                }
                if (walkers.length > 0) {
                    popupWalkersList.innerHTML = walkers.map(w => `
                        <div class="walker-item"><i class="fas fa-user-circle"></i> ${w}</div>
                    `).join('');
                    popupWalkersList.classList.remove('hidden');
                    popupNoWalkers.classList.add('hidden');
                } else {
                    popupWalkersList.classList.add('hidden');
                    popupNoWalkers.classList.remove('hidden');
                }

                // Обновить кнопку избранного
                updateFavButton(route.favorite);
                popupOverlay.classList.add('active');
            }

            function updateFavButton(isFav) {
                if (isFav) {
                    popupToggleFav.innerHTML = '<i class="fas fa-star" style="color:#ffb340;"></i> В избранном';
                    popupToggleFav.style.background = 'rgba(255, 179, 64, 0.15)';
                } else {
                    popupToggleFav.innerHTML = '<i class="fas fa-star"></i> В избранное';
                    popupToggleFav.style.background = 'rgba(76, 175, 80, 0.1)';
                }
            }

            function closePopup() {
                popupOverlay.classList.remove('active');
                currentPopupId = null;
            }

            // Обработчики попапа
            popupClose.addEventListener('click', closePopup);
            popupOverlay.addEventListener('click', function(e) {
                if (e.target === this) closePopup();
            });

            // Toggle избранного в попапе
            popupToggleFav.addEventListener('click', function(e) {
                e.stopPropagation();
                if (currentPopupId === null) return;
                const route = routes.find(r => r.id === currentPopupId);
                if (!route) return;
                route.favorite = !route.favorite;
                updateFavButton(route.favorite);
                renderFavorites(); // перерисовать список
                // если удалили из избранного и список пуст, попап всё равно закрываем? оставим открытым.
                // но обновим иконку
            });

            // Кнопка "Присоединиться"
            popupJoinBtn.addEventListener('click', function() {
                if (currentPopupId === null) return;
                const route = routes.find(r => r.id === currentPopupId);
                if (!route) return;
                route.walkers += 1;
                // обновить попап
                popupWalkers.textContent = route.walkers;
                // обновить мок-список (добавим нового)
                const walkerItems = popupWalkersList.querySelectorAll('.walker-item');
                if (walkerItems.length < 5) {
                    const newWalker = document.createElement('div');
                    newWalker.className = 'walker-item';
                    newWalker.innerHTML = `<i class="fas fa-user-circle"></i> Вы (только что)`;
                    popupWalkersList.appendChild(newWalker);
                    popupWalkersList.classList.remove('hidden');
                    popupNoWalkers.classList.add('hidden');
                }
                // обновить fav карточки
                renderFavorites();
                // обновить счетчик в попапе
                popupWalkers.textContent = route.walkers;
                // также обновить badge в карточке? renderFavorites уже сделал
            });

            // Навигация (демо)
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    this.classList.add('active');
                    // имитация переключения страниц
                    const page = this.dataset.page;
                    if (page === 'favorites') {
                        renderFavorites();
                    } else {
                        favListEl.innerHTML =
                            `<div style="padding:40px 20px;text-align:center;color:#8e8e93;"><i class="fas fa-map-pin" style="font-size:40px;margin-bottom:12px;display:block;"></i>Страница "${page}" в разработке</div>`;
                        emptyEl.classList.add('hidden');
                    }
                });
            });

            // Инициализация
            renderFavorites();

            // для демонстрации: если избранных нет, показать плейсхолдер с кнопкой добавить
            // добавим возможность добавить маршрут (скрытая фича) – по клику на empty добавим первый маршрут
            emptyEl.addEventListener('click', function() {
                const firstRoute = routes.find(r => !r.favorite);
                if (firstRoute) {
                    firstRoute.favorite = true;
                    renderFavorites();
                } else {
                    // если все уже в избранном — ничего
                    alert('Все маршруты уже в избранном!');
                }
            });

            // Экспорт (для демонстрации)
            window.TrailsTails = {
                renderFavorites,
                updateStats: () => { console.log('stats updated'); }
            };

        })();
    </script>
</body>
</html>
